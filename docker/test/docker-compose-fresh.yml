version: '3.8'

services:
  pulseha-node1:
    build:
      context: ../../
      dockerfile: docker/test/Dockerfile
    container_name: pulseha-node1
    hostname: node1
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      pulseha-net:
        ipv4_address: 172.20.0.10
    volumes:
      - node1-config:/etc/pulseha
    environment:
      - PULSEHA_NODE_ID=node1
      - PULSEHA_BIND_IP=172.20.0.10
      - PULSEHA_BIND_PORT=8080
    # Start pulseha without any configuration - just like a fresh install
    command: ["/usr/local/bin/pulseha"]
    ports:
      - "8081:8080"

  pulseha-node2:
    build:
      context: ../../
      dockerfile: docker/test/Dockerfile
    container_name: pulseha-node2
    hostname: node2
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      pulseha-net:
        ipv4_address: 172.20.0.11
    volumes:
      - node2-config:/etc/pulseha
    environment:
      - PULSEHA_NODE_ID=node2
      - PULSEHA_BIND_IP=172.20.0.11
      - PULSEHA_BIND_PORT=8080
    # Start with a delay to ensure node1 is up first
    command: ["/bin/bash", "-c", "sleep 5 && /usr/local/bin/pulseha"]
    ports:
      - "8082:8080"

  pulseha-node3:
    build:
      context: ../../
      dockerfile: docker/test/Dockerfile
    container_name: pulseha-node3
    hostname: node3
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      pulseha-net:
        ipv4_address: 172.20.0.12
    volumes:
      - node3-config:/etc/pulseha
    environment:
      - PULSEHA_NODE_ID=node3
      - PULSEHA_BIND_IP=172.20.0.12
      - PULSEHA_BIND_PORT=8080
    # Start with a longer delay
    command: ["/bin/bash", "-c", "sleep 10 && /usr/local/bin/pulseha"]
    ports:
      - "8083:8080"

networks:
  pulseha-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  node1-config:
  node2-config:
  node3-config: