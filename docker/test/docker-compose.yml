version: '3.8'

services:
  pulseha-node1:
    build:
      context: ../../
      dockerfile: docker/test/Dockerfile
    container_name: pulseha-node1
    hostname: node1
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      pulseha-net:
        ipv4_address: 172.20.0.10
    volumes:
      - node1-config:/home/pulseha/.pulseha
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PULSEHA_NODE_ID=node1
    command: ["/bin/bash", "-c", "echo '{\"pulseha\":{\"local_node\":\"node1\",\"logging_level\":\"debug\",\"bind_address\":\"172.20.0.10\",\"bind_port\":\"9083\"}, \"nodes\":{\"node1\":{\"hostname\":\"node1\",\"bind_address\":\"172.20.0.10\",\"bind_port\":\"9083\"}, \"node2\":{\"hostname\":\"node2\",\"bind_address\":\"172.20.0.11\",\"bind_port\":\"9083\"}, \"node3\":{\"hostname\":\"node3\",\"bind_address\":\"172.20.0.12\",\"bind_port\":\"9083\"}}}' > /home/pulseha/.pulseha/config.json && sleep 5 && /usr/local/bin/pulseha"]
    ports:
      - "9081:9083"

  pulseha-node2:
    build:
      context: ../../
      dockerfile: docker/test/Dockerfile
    container_name: pulseha-node2
    hostname: node2
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      pulseha-net:
        ipv4_address: 172.20.0.11
    volumes:
      - node2-config:/home/pulseha/.pulseha
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PULSEHA_NODE_ID=node2
    command: ["/bin/bash", "-c", "echo '{\"pulseha\":{\"local_node\":\"node2\",\"logging_level\":\"debug\",\"bind_address\":\"172.20.0.11\",\"bind_port\":\"9083\"}, \"nodes\":{\"node1\":{\"hostname\":\"node1\",\"bind_address\":\"172.20.0.10\",\"bind_port\":\"9083\"}, \"node2\":{\"hostname\":\"node2\",\"bind_address\":\"172.20.0.11\",\"bind_port\":\"9083\"}, \"node3\":{\"hostname\":\"node3\",\"bind_address\":\"172.20.0.12\",\"bind_port\":\"9083\"}}}' > /home/pulseha/.pulseha/config.json && sleep 10 && /usr/local/bin/pulseha"]
    ports:
      - "9082:9083"

  pulseha-node3:
    build:
      context: ../../
      dockerfile: docker/test/Dockerfile
    container_name: pulseha-node3
    hostname: node3
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      pulseha-net:
        ipv4_address: 172.20.0.12
    volumes:
      - node3-config:/home/pulseha/.pulseha
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PULSEHA_NODE_ID=node3
    command: ["/bin/bash", "-c", "echo '{\"pulseha\":{\"local_node\":\"node3\",\"logging_level\":\"debug\",\"bind_address\":\"172.20.0.12\",\"bind_port\":\"9083\"}, \"nodes\":{\"node1\":{\"hostname\":\"node1\",\"bind_address\":\"172.20.0.10\",\"bind_port\":\"9083\"}, \"node2\":{\"hostname\":\"node2\",\"bind_address\":\"172.20.0.11\",\"bind_port\":\"9083\"}, \"node3\":{\"hostname\":\"node3\",\"bind_address\":\"172.20.0.12\",\"bind_port\":\"9083\"}}}' > /home/pulseha/.pulseha/config.json && sleep 15 && /usr/local/bin/pulseha"]
    ports:
      - "9083:9083"

networks:
  pulseha-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  node1-config:
  node2-config:
  node3-config: