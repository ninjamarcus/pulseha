name: master
on:
  push:
    branches:
      - 'master'
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

#    - name: Test
#      run: make test

    - name: Dependencies
      run: make get

    - name: Build
      run: make
