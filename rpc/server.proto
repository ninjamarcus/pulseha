syntax = "proto3";

package rpc;

option go_package = "github.com/syleron/pulseha/rpc";

// Log Level Enum
enum LogLevel {
    DEBUG = 0;
    INFO = 1;
    WARNING = 2;
    ERROR = 3;
}

// CLI Service
// -----------------------------------------------------------------------------
// This service is primarily the daemon-local API that `pulsectl` calls on
// 127.0.0.1. It also contains a small number of RPCs that are invoked by
// other nodes during membership operations.
//
// Organization of methods below:
// - Membership (remote-target): called by other nodes to join/leave.
// - Daemon-local admin: used by the local CLI to manage the node/cluster.
// - Group management: CRUD and assignment for floating IP groups.
// - Orchestration (local-only): helpers that orchestrate multi-step flows
//   while keeping pulsectl connectivity local-only.
// - Quorum info: read-only inspection of voting sessions.
service CLI {
    // Membership (remote-target)
    rpc Join(JoinRequest) returns (JoinResponse) {}
    rpc Leave(LeaveRequest) returns (LeaveResponse) {}

    // Daemon-local admin
    rpc Status(StatusRequest) returns (StatusResponse) {}
    rpc Promote(PromoteRequest) returns (PromoteResponse) {}
    rpc SetMode(SetModeRequest) returns (SetModeResponse) {}
    // Config updates
    rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse) {}
    // Network resync
    rpc ResyncNetwork(ResyncNetworkRequest) returns (ResyncNetworkResponse) {}
    // Cluster lifecycle
    rpc CreateCluster(CreateClusterRequest) returns (CreateClusterResponse) {}
    // Token management
    rpc Token(TokenRequest) returns (TokenResponse) {}

    // Group management
    rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse) {}
    rpc AddIPToGroup(AddIPToGroupRequest) returns (AddIPToGroupResponse) {}
    rpc RemoveIPFromGroup(RemoveIPFromGroupRequest) returns (RemoveIPFromGroupResponse) {}
    rpc AssignGroupToNode(AssignGroupRequest) returns (AssignGroupResponse) {}
    rpc UnassignGroupFromNode(UnassignGroupRequest) returns (UnassignGroupResponse) {}
    rpc DeleteGroup(DeleteGroupRequest) returns (DeleteGroupResponse) {}
    rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse) {}

    // Orchestration (local-only)
    // Initiate a server-driven join against a target member
    rpc InitiateJoin(InitiateJoinRequest) returns (InitiateJoinResponse) {}

    // Quorum info (read-only)
    rpc GetVotingSessions(GetVotingSessionsRequest) returns (GetVotingSessionsResponse) {}
    rpc GetVotingSessionDetails(GetVotingSessionDetailsRequest) returns (GetVotingSessionDetailsResponse) {}
}

// Server Service
// -----------------------------------------------------------------------------
// Inter-node service used for state synchronization, quorum voting, and
// operational actions (IP bring up/down, health checks, removal, etc.).
service Server {
    rpc ConfigSync(ConfigSyncRequest) returns (ConfigSyncResponse) {}
    rpc MakePassive(MakePassiveRequest) returns (MakePassiveResponse) {}
    rpc BringUpIP(UpIpRequest) returns (UpIpResponse) {}
    rpc BringDownIP(DownIpRequest) returns (DownIpResponse) {}
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {}
    rpc Logs(LogsRequest) returns (LogsResponse) {}
    rpc Remove(RemoveRequest) returns (RemoveResponse) {}
    rpc CoordinateRemoval(CoordinateRemovalRequest) returns (CoordinateRemovalResponse) {}
    // Quorum voting methods
    rpc StartVotingSession(StartVotingSessionRequest) returns (StartVotingSessionResponse) {}
    rpc CastVote(CastVoteRequest) returns (CastVoteResponse) {}
    rpc GetVotingResult(GetVotingResultRequest) returns (GetVotingResultResponse) {}
}

// Join Request/Response
message JoinRequest {
    string hostname = 1;  // Node hostname (display/identifier only)
    string token = 2;    // Cluster join token
    string node_id = 3;  // Required node ID
    string bind_ip = 4;  // Optional local bind IP
    string bind_port = 5; // Optional local bind port
}

message JoinResponse {
    bool success = 1;
    string message = 2;
    string node_id = 3;
    bytes cluster_config = 4;  // Full cluster configuration for the joining node
}

// Leave Request/Response
message LeaveRequest {
    string node_id = 1;
}

message LeaveResponse {
    bool success = 1;
    string message = 2;
}

// Status Request/Response
message StatusRequest {}

message StatusResponse {
    repeated Member members = 1;
    repeated GroupInfo groups = 2;  // Add group information to the response
}

// Member status enum provides explicit values on the wire
enum MemberStatusEnum {
    MEMBER_STATUS_UNKNOWN = 0;
    MEMBER_STATUS_ACTIVE = 1;
    MEMBER_STATUS_PASSIVE = 2;
    MEMBER_STATUS_PARTIAL_ACTIVE = 3;
}

message Member {
    string hostname = 1;  // Node hostname (display only)
    MemberStatusEnum status = 2;
    repeated string active_ips = 3;
    string last_response = 4;
    string latency = 5;
    bool partial_active = 6;
    string ip = 7;
    string port = 8;
    string node_id = 9;  // UUID of the node
    map<string, GroupAssignment> group_assignments = 10;  // Map of interface to group assignments
}

// Promote Request/Response
message PromoteRequest {
    string node_id = 1;
    repeated string ips = 2;
}

message PromoteResponse {
    bool success = 1;
    string message = 2;
}

// ConfigSync Request/Response
message ConfigSyncRequest {
    bytes config = 1;
}

message ConfigSyncResponse {
    bool success = 1;
    string message = 2;
}

// MakePassive Request/Response
message MakePassiveRequest {
    string node_id = 1;
}

message MakePassiveResponse {
    bool success = 1;
    string message = 2;
}

// IP Management Request/Response
message UpIpRequest {
    string iface = 1;
    repeated string ips = 2;
}

message UpIpResponse {
    bool success = 1;
    string message = 2;
}

message DownIpRequest {
    string iface = 1;
    repeated string ips = 2;
}

message DownIpResponse {
    bool success = 1;
    string message = 2;
}

// Health Check Request/Response
message HealthCheckRequest {
    string node_id = 1;   // Primary identifier (UUID)
}

message HealthCheckResponse {
    bool success = 1;
    string message = 2;
}

// Logs Request/Response
message LogsRequest {
    int32 lines = 1;
    LogLevel level = 2;
    string message = 3;
    string node_id = 4;
}

message LogsResponse {
    repeated string logs = 1;
}

// Remove Request/Response
message RemoveRequest {
    string node_id = 1;
}

message RemoveResponse {
    bool success = 1;
    string message = 2;
}

// CoordinateRemoval Request/Response
// Used when a node wants to leave the cluster in a deterministic way.
// The coordinator ensures all cluster members remove the node before responding.
message CoordinateRemovalRequest {
    string node_id = 1;  // The node ID requesting to leave
}

message CoordinateRemovalResponse {
    bool success = 1;
    string message = 2;
    int32 updated_nodes = 3;  // Number of nodes successfully updated
    repeated string failed_nodes = 4;  // Node IDs that failed to update
}

// Mode Management Request/Response
message SetModeRequest {
    string mode = 1;  // active-passive or active-active
}

message SetModeResponse {
    bool success = 1;
    string message = 2;
}

// Config Update Request/Response
message UpdateConfigRequest {
    string key = 1;    // e.g., "logging_level" or nested via json tag
    string value = 2;  // string representation; server handles type conversion
}

message UpdateConfigResponse {
    bool success = 1;
    string message = 2;
}

// Resync Network
message ResyncNetworkRequest {
    bool create_default_groups = 1; // if true, create default groups for new interfaces
}

message ResyncNetworkResponse {
    bool success = 1;
    string message = 2;
}

// New message types for configuration management

// Group Management
message CreateGroupRequest {
    string name = 1;
}

message CreateGroupResponse {
    bool success = 1;
    string message = 2;
}

message AddIPToGroupRequest {
    string group_name = 1;
    string ip = 2;
}

message AddIPToGroupResponse {
    bool success = 1;
    string message = 2;
    repeated string warnings = 3;
}

message RemoveIPFromGroupRequest {
    string group_name = 1;
    string ip = 2;
}

message RemoveIPFromGroupResponse {
    bool success = 1;
    string message = 2;
    repeated string warnings = 3;
}

message AssignGroupRequest {
    string group_name = 1;
    string node_id = 2;   // canonical target identifier (UUID)
    string interface = 3;
}

message AssignGroupResponse {
    bool success = 1;
    string message = 2;
}

message ListGroupsRequest {
    bool json_output = 1;
}

message GroupInfo {
    string name = 1;
    repeated string ips = 2;
    repeated GroupAssignment assignments = 3;
}

message GroupAssignment {
    string interface = 1;
    string node_id = 2;
}

message ListGroupsResponse {
    bool success = 1;
    string message = 2;
    repeated GroupInfo groups = 3;
    string json_data = 4;  // For raw JSON output
}

// Group Unassignment
message UnassignGroupRequest {
    string group_name = 1;
    string interface = 2;
    string node_id = 3;
}

message UnassignGroupResponse {
    bool success = 1;
    string message = 2;
}

// Group Deletion
message DeleteGroupRequest {
    string group_name = 1;
    bool force = 2;  // Force deletion even if assigned to nodes
}

message DeleteGroupResponse {
    bool success = 1;
    string message = 2;
    repeated string warnings = 3;
}

// Cluster Management
message CreateClusterRequest {
    string bind_ip = 1;
    string bind_port = 2;
    string mode = 3;  // active-passive or active-active
    string node_id = 4; // optional: custom node ID for first node
}

message CreateClusterResponse {
    bool success = 1;
    string message = 2;
    string token = 3;  // Add token field for cluster join token
    string node_id = 4;  // Generated node ID for the first node
}

// Quorum Voting Types
enum VoteType {
    NODE_STATUS = 0;
    IP_REDISTRIBUTION = 1;
    CONFIG_CHANGE = 2;
}

enum VoteDecision {
    YES = 0;
    NO = 1;
    ABSTAIN = 2;
}

// Quorum Voting Messages
message StartVotingSessionRequest {
    VoteType type = 1;
    string subject = 2;
    string description = 3;
    int64 timeout_seconds = 4;
}

message StartVotingSessionResponse {
    bool success = 1;
    string message = 2;
    string session_id = 3;
}

message CastVoteRequest {
    string session_id = 1;
    string voter_id = 2;
    VoteDecision decision = 3;
}

message CastVoteResponse {
    bool success = 1;
    string message = 2;
}

message GetVotingResultRequest {
    string session_id = 1;
}

message VotingSessionResult {
    bool passed = 1;
    int32 yes_count = 2;
    int32 no_count = 3;
    int32 total_votes = 4;
    bool quorum_met = 5;
    int64 completed_at = 6; // Unix timestamp
}

message GetVotingResultResponse {
    bool success = 1;
    string message = 2;
    VotingSessionResult result = 3;
}

message GetVotingSessionsRequest {
    bool include_completed = 1;
}

message VotingSessionInfo {
    string id = 1;
    VoteType type = 2;
    string subject = 3;
    string description = 4;
    int64 start_time = 5; // Unix timestamp
    int64 end_time = 6; // Unix timestamp
    bool completed = 7;
    VotingSessionResult result = 8;
}

message GetVotingSessionsResponse {
    bool success = 1;
    string message = 2;
    repeated VotingSessionInfo sessions = 3;
}

message GetVotingSessionDetailsRequest {
    string session_id = 1;
}

message Vote {
    string voter_id = 1;
    VoteDecision decision = 2;
    int64 timestamp = 3; // Unix timestamp
}

message GetVotingSessionDetailsResponse {
    bool success = 1;
    string message = 2;
    VotingSessionInfo session = 3;
    repeated Vote votes = 4;
}

// Token Management Request/Response
message TokenRequest {
    bool regenerate = 1; // If true, generate a new token; if false, return current token
}

message TokenResponse {
    bool success = 1;
    string message = 2;
    string token = 3; // The cluster join token
} 

// Server-driven join
message InitiateJoinRequest {
    string target_host = 1;
    string target_port = 2;
    string token = 3;
    string bind_ip = 4;
    string bind_port = 5;
    string node_id = 6;
}

message InitiateJoinResponse {
    bool success = 1;
    string message = 2;
}